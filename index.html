<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        table,th,td {
            border : 1px solid black;
            border-collapse: collapse;
        }
        th,td {
            padding: 5px;
        }
        .my-info {
            background-color: #f2f2f2;
            padding: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="my-info">
    <h3>Πανεπιστήμιο Αιγαίου ΤΠΤΕ</h3>
    <p><b>Φοιτητής:</b> Μανδαμαδιώτης Μιχαήλ - ct18162 </p>
    <p><b>Θέμα:</b> Συλλογή Νομισμάτων (Πηγή:https://mint.bankofgreece.gr/el/nomismata/) </p>
</div>

<button type="button" onclick="loadDoc()">1. Φόρτωση δεδομένων</button>
<button type="button" onclick="loadAndSort()">2. Ταξινόμηση (Δημιουργός)</button>
<button type="button" onclick="showNewest()">3. Εμφάνιση Νεότερου</button>
<button type="button" onclick="showCheapest()">4. Εμφάνιση Φθηνότερου</button>

<br><br>
<table id="demo"></table>

<script>
function loadDoc() {
  const xhttp = new XMLHttpRequest();
  xhttp.onload = function() {
    myFunction(this);
  }
  xhttp.open("GET", "nomismata.xml");
  xhttp.send();
}

function myFunction(xml) {
  const xmlDoc = xml.responseXML;
  const x = xmlDoc.getElementsByTagName("NOMISMA");
  let table="<tr><th>Τίτλος</th><th>Δημιουργός</th><th>Έτος</th><th>Τιμή (€)</th></tr>";
  for (let i = 0; i < x.length; i++) { 
    table += "<tr><td>" +
    x[i].getElementsByTagName("TITLOS")[0].childNodes[0].nodeValue + "</td><td>" +
    x[i].getElementsByTagName("DIMIOURGOS")[0].childNodes[0].nodeValue + "</td><td>" +
    x[i].getElementsByTagName("ETOS")[0].childNodes[0].nodeValue + "</td><td>" +
    x[i].getElementsByTagName("TIMI")[0].childNodes[0].nodeValue + "</td></tr>";
  }
  document.getElementById("demo").innerHTML = table;
}


function loadAndSort() {
  const xhttp = new XMLHttpRequest();
  xhttp.onload = function() {
    sortArtist(this);
  }
  xhttp.open("GET", "nomismata.xml");
  xhttp.send();
}

function compare(a,b) {
  if (a[1] < b[1]) return -1;
  if (a[1] > b[1]) return 1;
  return 0;
}

function sortArtist(xml) {
  const xmlDoc = xml.responseXML;
  const x = xmlDoc.getElementsByTagName("NOMISMA");
  let selection = [];
  for (let i=0; i<x.length; i++) {
      // Παίρνουμε το index και το όνομα δημιουργού για ταξινόμηση
      const artist = [i, x[i].getElementsByTagName("DIMIOURGOS")[0].childNodes[0].nodeValue];
      selection.push(artist);
  }
  selection.sort(compare);
  
  renderResult(x, selection);
}

function showNewest() {
  const xhttp = new XMLHttpRequest();
  xhttp.onload = function() {
    const xmlDoc = this.responseXML;
    const x = xmlDoc.getElementsByTagName("NOMISMA");
    let maxEtos = 0;
    let index = 0;
    for (let i=0; i<x.length; i++) {
        let currentEtos = parseInt(x[i].getElementsByTagName("ETOS")[0].childNodes[0].nodeValue);
        if (currentEtos > maxEtos) {
            maxEtos = currentEtos;
            index = i;
        }
    }
    renderSingle(x, index);
  }
  xhttp.open("GET", "nomismata.xml");
  xhttp.send();
}


function showCheapest() {
  const xhttp = new XMLHttpRequest();
  xhttp.onload = function() {
    const xmlDoc = this.responseXML;
    const x = xmlDoc.getElementsByTagName("NOMISMA");
    let minPrice = Infinity;
    let index = 0;
    for (let i=0; i<x.length; i++) {
        let currentPrice = parseFloat(x[i].getElementsByTagName("TIMI")[0].childNodes[0].nodeValue);
        if (currentPrice < minPrice) {
            minPrice = currentPrice;
            index = i;
        }
    }
    renderSingle(x, index);
  }
  xhttp.open("GET", "nomismata.xml");
  xhttp.send();
}


function renderResult(x, selection) {
  let table="<tr><th>Τίτλος</th><th>Δημιουργός</th><th>Έτος</th><th>Τιμή (€)</th></tr>";
  for (let j = 0; j < selection.length; j++) {
    let i = selection[j][0];
    table += "<tr><td>" + x[i].getElementsByTagName("TITLOS")[0].childNodes[0].nodeValue + "</td><td>" +
             x[i].getElementsByTagName("DIMIOURGOS")[0].childNodes[0].nodeValue + "</td><td>" +
             x[i].getElementsByTagName("ETOS")[0].childNodes[0].nodeValue + "</td><td>" +
             x[i].getElementsByTagName("TIMI")[0].childNodes[0].nodeValue + "</td></tr>";
  }
  document.getElementById("demo").innerHTML = table;
}

function renderSingle(x, i) {
  let table="<tr><th>Τίτλος</th><th>Δημιουργός</th><th>Έτος</th><th>Τιμή (€)</th></tr>";
  table += "<tr><td>" + x[i].getElementsByTagName("TITLOS")[0].childNodes[0].nodeValue + "</td><td>" +
           x[i].getElementsByTagName("DIMIOURGOS")[0].childNodes[0].nodeValue + "</td><td>" +
           x[i].getElementsByTagName("ETOS")[0].childNodes[0].nodeValue + "</td><td>" +
           x[i].getElementsByTagName("TIMI")[0].childNodes[0].nodeValue + "</td></tr>";
  document.getElementById("demo").innerHTML = table;
}
</script>

</body>
</html>
