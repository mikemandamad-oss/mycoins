<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        table,th,td {
            border : 1px solid black;
            border-collapse: collapse;
        }
        th,td {
            padding: 5px;
        }
    </style>
</head>
<body>

<h2>Συλλογή Νομισμάτων (Πηγή:https://mint.bankofgreece.gr/el/nomismata/)</h2>

<button type="button" onclick="loadDoc()">Εμφάνιση Συλλογής</button>
<button type="button" onclick="loadAndSortPrice()">Ταξινόμηση ανά Τιμή</button>
<button type="button" onclick="loadAndSortArtist()">Ταξινόμηση ανά Καλλιτέχνη</button>
<button type="button" onclick="showMinPrice()">Εμφάνιση Φθηνότερου</button>
<button type="button" onclick="showNewest()">Εμφάνιση Νεότερου</button>

<br><br>
<table id="demo"></table>

<script>
// Βασική συνάρτηση XMLHttpRequest (Πρότυπο ASKISI 7)
function loadDoc() {
  const xhttp = new XMLHttpRequest();
  xhttp.onload = function() {
    myFunction(this);
  }
  xhttp.open("GET", "nomismata.xml");
  xhttp.send();
}

function myFunction(xml) {
  const xmlDoc = xml.responseXML;
  const x = xmlDoc.getElementsByTagName("NOMISMA");
  let table="<tr><th>Τίτλος</th><th>Καλλιτέχνης</th><th>Έτος</th><th>Τιμή</th></tr>";
  for (let i = 0; i < x.length; i++) { 
    table += "<tr><td>" +
    x[i].getElementsByTagName("TITLOS")[0].childNodes[0].nodeValue + "</td><td>" +
    x[i].getElementsByTagName("DIMIOURGOS")[0].childNodes[0].nodeValue + "</td><td>" +
    x[i].getElementsByTagName("ETOS")[0].childNodes[0].nodeValue + "</td><td>" +
    x[i].getElementsByTagName("TIMI")[0].childNodes[0].nodeValue + "</td></tr>";
  }
  document.getElementById("demo").innerHTML = table;
}

// Συναρτήσεις Compare (Πρότυπο ASKHSH 7 - SORT BY PRICE)
function comparePrice(a,b) { return a[1] - b[1]; }
function compareArtist(a,b) { return a[1].localeCompare(b[1]); }

// Ταξινόμηση ανά Τιμή με χρήση του πίνακα selection
function loadAndSortPrice() {
  const xhttp = new XMLHttpRequest();
  xhttp.onload = function() {
    const xmlDoc = this.responseXML;
    const x = xmlDoc.getElementsByTagName("NOMISMA");
    let selection = [];
    for (let i=0; i<x.length; i++) {
      const val = [i, parseFloat(x[i].getElementsByTagName("TIMI")[0].childNodes[0].nodeValue)];
      selection.push(val);
    }
    selection.sort(comparePrice);
    renderSorted(x, selection);
  }
  xhttp.open("GET", "nomismata.xml");
  xhttp.send();
}

// Ταξινόμηση ανά Καλλιτέχνη (Δημιουργό)
function loadAndSortArtist() {
  const xhttp = new XMLHttpRequest();
  xhttp.onload = function() {
    const xmlDoc = this.responseXML;
    const x = xmlDoc.getElementsByTagName("NOMISMA");
    let selection = [];
    for (let i=0; i<x.length; i++) {
      const val = [i, x[i].getElementsByTagName("DIMIOURGOS")[0].childNodes[0].nodeValue];
      selection.push(val);
    }
    selection.sort(compareArtist);
    renderSorted(x, selection);
  }
  xhttp.open("GET", "nomismata.xml");
  xhttp.send();
}

// Εύρεση Φθηνότερου (Αλγόριθμος εύρεσης ελαχίστου)
function showMinPrice() {
  const xhttp = new XMLHttpRequest();
  xhttp.onload = function() {
    const xmlDoc = this.responseXML;
    const x = xmlDoc.getElementsByTagName("NOMISMA");
    let min = parseFloat(x[0].getElementsByTagName("TIMI")[0].childNodes[0].nodeValue);
    let index = 0;
    for (let i=1; i<x.length; i++) {
      let current = parseFloat(x[i].getElementsByTagName("TIMI")[0].childNodes[0].nodeValue);
      if (current < min) { min = current; index = i; }
    }
    renderSingle(x, index);
  }
  xhttp.open("GET", "nomismata.xml");
  xhttp.send();
}

// Εύρεση Νεότερου (Αλγόριθμος εύρεσης μεγίστου στο έτος)
function showNewest() {
  const xhttp = new XMLHttpRequest();
  xhttp.onload = function() {
    const xmlDoc = this.responseXML;
    const x = xmlDoc.getElementsByTagName("NOMISMA");
    let maxEtos = parseInt(x[0].getElementsByTagName("ETOS")[0].childNodes[0].nodeValue);
    let index = 0;
    for (let i=1; i<x.length; i++) {
      let current = parseInt(x[i].getElementsByTagName("ETOS")[0].childNodes[0].nodeValue);
      if (current > maxEtos) { maxEtos = current; index = i; }
    }
    renderSingle(x, index);
  }
  xhttp.open("GET", "nomismata.xml");
  xhttp.send();
}

// Συναρτήσεις Render (ακολουθούν το DOM pattern του καθηγητή)
function renderSorted(x, selection) {
  let table="<tr><th>Τίτλος</th><th>Καλλιτέχνης</th><th>Έτος</th><th>Τιμή</th></tr>";
  for (let j = 0; j < selection.length; j++) {
    let i = selection[j][0];
    table += "<tr><td>" + x[i].getElementsByTagName("TITLOS")[0].childNodes[0].nodeValue + "</td><td>" +
             x[i].getElementsByTagName("DIMIOURGOS")[0].childNodes[0].nodeValue + "</td><td>" +
             x[i].getElementsByTagName("ETOS")[0].childNodes[0].nodeValue + "</td><td>" +
             x[i].getElementsByTagName("TIMI")[0].childNodes[0].nodeValue + "</td></tr>";
  }
  document.getElementById("demo").innerHTML = table;
}

function renderSingle(x, i) {
  let table="<tr><th>Τίτλος</th><th>Καλλιτέχνης</th><th>Έτος</th><th>Τιμή</th></tr>";
  table += "<tr><td>" + x[i].getElementsByTagName("TITLOS")[0].childNodes[0].nodeValue + "</td><td>" +
           x[i].getElementsByTagName("DIMIOURGOS")[0].childNodes[0].nodeValue + "</td><td>" +
           x[i].getElementsByTagName("ETOS")[0].childNodes[0].nodeValue + "</td><td>" +
           x[i].getElementsByTagName("TIMI")[0].childNodes[0].nodeValue + "</td></tr>";
  document.getElementById("demo").innerHTML = table;
}
</script>

</body>
</html>
