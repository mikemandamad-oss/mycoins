<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        table,th,td {
            border : 1px solid black;
            border-collapse: collapse;
        }
        th,td {
            padding: 5px;
        }
        .my-info {
            background-color: #f2f2f2;
            padding: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="my-info">
    <h3>Πανεπιστήμιο Αιγαίου ΤΠΤΕ</h3>
    <p><b>Φοιτητής:</b> Μανδαμαδιώτης Μιχαήλ - ct18162 </p>
    <p><b>Θέμα:</b> Συλλογή Νομισμάτων (Πηγή:https://mint.bankofgreece.gr/el/nomismata/) </p>
</div>



<button type="button" onclick="loadDoc()">1. Φόρτωση δεδομένων</button>
<button type="button" onclick="loadAndSortArtist()">2. Ταξινόμηση (Δημιουργός)</button>
<button type="button" onclick="showNewest()">3. Εμφάνιση Νεότερου</button>
<button type="button" onclick="showCheapest()">4. Εμφάνιση Φθηνότερου</button>

<br><br>
<table id="demo"></table>

<script>

function loadDoc() {
  const xhttp = new XMLHttpRequest();
  xhttp.onload = function() {
    const xmlDoc = this.responseXML;
    const x = xmlDoc.getElementsByTagName("NOMISMA");
    let table="<tr><th>Τίτλος</th><th>Δημιουργός</th><th>Έτος</th><th>Τιμή (€)</th></tr>";
    for (let i = 0; i < x.length; i++) { 
        table += "<tr><td>" + getVal(x[i], "TITLOS") + "</td><td>" + getVal(x[i], "DIMIOURGOS") + "</td><td>" + getVal(x[i], "ETOS") + "</td><td>" + getVal(x[i], "TIMI") + "</td></tr>";
    }
    document.getElementById("demo").innerHTML = table;
  }
  xhttp.open("GET", "nomismata.xml");
  xhttp.send();
}


function loadAndSortArtist() {
  const xhttp = new XMLHttpRequest();
  xhttp.onload = function() {
    const xmlDoc = this.responseXML;
    const x = xmlDoc.getElementsByTagName("NOMISMA");
    let selection = [];
    for (let i=0; i<x.length; i++) {
      selection.push([i, x[i].getElementsByTagName("DIMIOURGOS")[0].childNodes[0].nodeValue]);
    }
    selection.sort(function(a, b) {
        if (a[1] < b[1]) return -1;
        if (a[1] > b[1]) return 1;
        return 0;
    });
    renderResult(x, selection);
  }
  xhttp.open("GET", "nomismata.xml");
  xhttp.send();
}


function showNewest() {
  const xhttp = new XMLHttpRequest();
  xhttp.onload = function() {
    const xmlDoc = this.responseXML;
    const x = xmlDoc.getElementsByTagName("NOMISMA");
    let max = 0; let idx = 0;
    for (let i=0; i<x.length; i++) {
        let y = parseInt(getVal(x[i], "ETOS"));
        if (y > max) { max = y; idx = i; }
    }
    renderOne(x, idx);
  }
  xhttp.open("GET", "nomismata.xml");
  xhttp.send();
}


function showCheapest() {
  const xhttp = new XMLHttpRequest();
  xhttp.onload = function() {
    const xmlDoc = this.responseXML;
    const x = xmlDoc.getElementsByTagName("NOMISMA");
    let min = 9999; let idx = 0;
    for (let i=0; i<x.length; i++) {
        let p = parseFloat(getVal(x[i], "TIMI"));
        if (p < min) { min = p; idx = i; }
    }
    renderOne(x, idx);
  }
  xhttp.open("GET", "nomismata.xml");
  xhttp.send();
}

function renderResult(x, selection) {
  let table="<tr><th>Τίτλος</th><th>Δημιουργός</th><th>Έτος</th><th>Τιμή (€)</th></tr>";
  for (let j = 0; j < selection.length; j++) {
    let i = selection[j][0];
    table += "<tr><td>" + getVal(x[i], "TITLOS") + "</td><td>" + getVal(x[i], "DIMIOURGOS") + "</td><td>" + getVal(x[i], "ETOS") + "</td><td>" + getVal(x[i], "TIMI") + "</td></tr>";
  }
  document.getElementById("demo").innerHTML = table;
}

function renderOne(x, i) {
  let table="<tr><th>Τίτλος</th><th>Δημιουργός</th><th>Έτος</th><th>Τιμή (€)</th></tr>";
  table += "<tr><td>" + getVal(x[i], "TITLOS") + "</td><td>" + getVal(x[i], "DIMIOURGOS") + "</td><td>" + getVal(x[i], "ETOS") + "</td><td>" + getVal(x[i], "TIMI") + "</td></tr>";
  document.getElementById("demo").innerHTML = table;
}

function getVal(node, tag) {
  return node.getElementsByTagName(tag)[0].childNodes[0].nodeValue;
}
</script>

</body>
</html>
